<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 资讯 · 每日简报</title>
<meta name="description" content="AI 资讯每日简报 — GPT-5.4 登顶 Arena, Qwen3-VL 发布, ARC-AGI-3, Claude Code Auto Mode 等最新 AI 动态。">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #222;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #f0c040;
    --accent-dim: rgba(240, 192, 64, 0.15);
    --max-w: 860px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  }

  html { font-size: 16px; -webkit-font-smoothing: antialiased; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .container {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 1.25rem;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 0 1.5rem;
  }

  .site-title {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .site-title span { color: var(--accent); }

  .site-subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  /* ── Main content ── */
  main {
    padding: 2.5rem 0;
  }

  .briefing-date {
    color: var(--text-dim);
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .briefing-title {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 1.5rem;
    color: var(--accent);
  }

  .briefing-content {
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.85;
    font-size: 1rem;
    color: var(--text);
  }

  .briefing-content strong,
  .briefing-content b {
    color: #fff;
    font-weight: 600;
  }

  .wisdom-section {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .wisdom-section h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .wisdom-content {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--text-dim);
  }

  /* ── Archive sidebar ── */
  .archive {
    border-top: 1px solid var(--border);
    padding: 2rem 0 3rem;
  }

  .archive h2 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 1rem;
  }

  .archive-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .archive-item {
    display: block;
    padding: 0.75rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    border: 1px solid transparent;
    cursor: pointer;
  }

  .archive-item:hover {
    background: var(--accent-dim);
    border-color: rgba(240, 192, 64, 0.2);
  }

  .archive-item.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .archive-date {
    font-size: 0.78rem;
    color: var(--accent);
    font-family: var(--mono);
    margin-bottom: 0.2rem;
  }

  .archive-title {
    font-size: 0.95rem;
    font-weight: 500;
  }

  .archive-summary {
    font-size: 0.82rem;
    color: var(--text-dim);
    margin-top: 0.2rem;
  }

  /* ── Footer ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 0;
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  /* ── Loading / Error ── */
  .loading {
    color: var(--text-dim);
    font-size: 0.9rem;
    padding: 3rem 0;
  }

  .error {
    color: #e55;
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .briefing-title { font-size: 1.3rem; }
    .briefing-content { font-size: 0.95rem; }
    .container { padding: 0 1rem; }
    header { padding: 1.75rem 0 1rem; }
    main { padding: 1.5rem 0; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="site-title">AI <span>资讯</span></div>
    <div class="site-subtitle">每日简报 · Daily Briefing</div>
  </header>

  <main id="main">
    <div class="loading">加载中…</div>
  </main>

  <section class="archive">
    <h2>历史简报</h2>
    <ul class="archive-list" id="archive">
      <li class="loading">加载中…</li>
    </ul>
  </section>

  <footer>babata.icu · AI 资讯聚合</footer>
</div>

<script>
(function() {
  const main = document.getElementById('main');
  const archiveList = document.getElementById('archive');
  let activeItem = null;
  let briefings = [];

  // ── Markdown-lite: bold only ──
  function renderText(text) {
    if (!text) return '';
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '\n'); // preserve newlines via pre-wrap
  }

  // ── Render a briefing in the main area ──
  function renderBriefing(data, dateStr) {
    const date = dateStr || data.date;
    main.innerHTML = `
      <div class="briefing-date">${date}</div>
      <h1 class="briefing-title">${data.title || ''}</h1>
      <div class="briefing-content">${renderText(data.content)}</div>
      ${data.wisdom ? `
        <div class="wisdom-section">
          <h3>💡 Insights</h3>
          <div class="wisdom-content">${renderText(data.wisdom)}</div>
        </div>
      ` : ''}
    `;
    document.title = `AI 资讯 · ${data.title || date}`;
  }

  // ── Render archive list ──
  function renderArchive(data) {
    archiveList.innerHTML = '';
    data.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'archive-item';
      li.setAttribute('data-date', item.date);
      li.innerHTML = `
        <div class="archive-date">${item.date}</div>
        <div class="archive-title">${item.title}</div>
        ${item.summary ? `<div class="archive-summary">${item.summary}</div>` : ''}
      `;
      li.addEventListener('click', () => loadBriefing(item.date, li));
      archiveList.appendChild(li);
      if (i === 0) activeItem = li;
    });
    if (activeItem) activeItem.classList.add('active');
  }

  // ── Fetch and display a specific day ──
  async function loadBriefing(date, li) {
    // Update active state
    if (activeItem) activeItem.classList.remove('active');
    activeItem = li;
    activeItem.classList.add('active');

    main.innerHTML = '<div class="loading">加载中…</div>';
    try {
      const res = await fetch(`/data/${date}.json`);
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      renderBriefing(data, date);
      main.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (e) {
      main.innerHTML = `<div class="error">无法加载 ${date} 的简报 (${e.message})</div>`;
    }
  }

  // ── Init ──
  async function init() {
    try {
      const res = await fetch('/data/briefings.json');
      if (!res.ok) throw new Error(`${res.status}`);
      briefings = await res.json();

      if (!briefings.length) {
        main.innerHTML = '<div class="error">暂无简报</div>';
        archiveList.innerHTML = '';
        return;
      }

      renderArchive(briefings);

      // Load latest
      const latest = briefings[0].date;
      const resLatest = await fetch(`/data/${latest}.json`);
      if (resLatest.ok) {
        const data = await resLatest.json();
        renderBriefing(data, latest);
      } else {
        // Fallback to archive entry data
        renderBriefing({
          date: briefings[0].date,
          title: briefings[0].title,
          content: briefings[0].summary,
          wisdom: ''
        });
      }
    } catch (e) {
      main.innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
      archiveList.innerHTML = '';
    }
  }

  init();
})();
</script>

</body>
</html>
